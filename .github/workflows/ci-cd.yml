name: BTG Funds CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Give permission to mvnw
        run: chmod +x btg-funds/mvnw

      - name: Run tests
        run: cd btg-funds && ./mvnw clean test

      - name: Build project
        run: cd btg-funds && ./mvnw clean package -DskipTests

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: btg-funds-jar
          path: btg-funds/target/*.jar