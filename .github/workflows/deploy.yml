name: BTG Funds CI/CD

on:
  push:
    branches:
      - main
    paths:
      - 'btg-funds/infra/**'
      - 'btg-funds/src/**'
      - 'btg-funds/pom.xml'
      - 'btg-funds/mvnw'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

jobs:
  infra:
    name: Resolve or Provision Infrastructure
    runs-on: ubuntu-latest
    environment: produccion

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check if EC2 already exists
        id: check_instance
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}
        run: |
          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=btg-funds-api" "Name=instance-state-name,Values=pending,running,stopping,stopped" \
            --query "Reservations[].Instances[].InstanceId | [0]" \
            --output text)

          if [ "$INSTANCE_ID" = "None" ] || [ -z "$INSTANCE_ID" ]; then
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "No existing instance found."
          else
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Existing instance found: $INSTANCE_ID"
          fi

      - name: Setup Terraform
        if: steps.check_instance.outputs.exists == 'false'
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        if: steps.check_instance.outputs.exists == 'false'
        working-directory: btg-funds/infra
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}
        run: terraform init -input=false

      - name: Terraform Validate
        if: steps.check_instance.outputs.exists == 'false'
        working-directory: btg-funds/infra
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}
        run: terraform validate

      - name: Terraform Plan
        if: steps.check_instance.outputs.exists == 'false'
        working-directory: btg-funds/infra
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}
        run: terraform plan -input=false -var-file="terraform.tfvars" -out=tfplan

      - name: Terraform Apply
        if: steps.check_instance.outputs.exists == 'false'
        working-directory: btg-funds/infra
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}
        run: terraform apply -input=false -auto-approve tfplan

  deploy:
    name: Build and Deploy Application
    runs-on: ubuntu-latest
    environment: produccion
    needs: infra

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Give permission to mvnw
        run: chmod +x btg-funds/mvnw

      - name: Run tests
        run: cd btg-funds && ./mvnw clean test

      - name: Build project
        run: cd btg-funds && ./mvnw clean package -DskipTests

      - name: Rename artifact
        run: |
          JAR_FILE=$(ls btg-funds/target/*.jar | head -n 1)
          cp "$JAR_FILE" btg-funds/target/btg-funds.jar

      - name: Resolve deploy variables from AWS
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
        run: |
          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=btg-funds-api" "Name=instance-state-name,Values=pending,running,stopping,stopped" \
            --query "Reservations[].Instances[].InstanceId | [0]" \
            --output text)

          if [ "$INSTANCE_ID" = "None" ] || [ -z "$INSTANCE_ID" ]; then
            echo "No EC2 instance found for deploy."
            exit 1
          fi

          STATE=$(aws ec2 describe-instances \
            --instance-ids "$INSTANCE_ID" \
            --query "Reservations[0].Instances[0].State.Name" \
            --output text)

          if [ "$STATE" = "stopped" ] || [ "$STATE" = "stopping" ]; then
            echo "Starting instance $INSTANCE_ID..."
            aws ec2 start-instances --instance-ids "$INSTANCE_ID" >/dev/null
          fi

          aws ec2 wait instance-running --instance-ids "$INSTANCE_ID"

          for i in {1..30}; do
            PUBLIC_DNS=$(aws ec2 describe-instances \
              --instance-ids "$INSTANCE_ID" \
              --query "Reservations[0].Instances[0].PublicDnsName" \
              --output text)

            PUBLIC_IP=$(aws ec2 describe-instances \
              --instance-ids "$INSTANCE_ID" \
              --query "Reservations[0].Instances[0].PublicIpAddress" \
              --output text)

            echo "Attempt $i/30 - PUBLIC_DNS=$PUBLIC_DNS - PUBLIC_IP=$PUBLIC_IP"

            if [ "$PUBLIC_DNS" != "None" ] && [ -n "$PUBLIC_DNS" ]; then
              echo "PUBLIC_DNS=$PUBLIC_DNS" >> "$GITHUB_ENV"
              echo "PUBLIC_IP=$PUBLIC_IP" >> "$GITHUB_ENV"
              echo "SSH_USER=ec2-user" >> "$GITHUB_ENV"
              echo "APP_URL=http://$PUBLIC_IP:$SERVER_PORT" >> "$GITHUB_ENV"
              exit 0
            fi

            sleep 10
          done

          echo "Public DNS never became available for deploy."
          exit 1

      - name: Show resolved infra values
        run: |
          echo "PUBLIC_DNS=$PUBLIC_DNS"
          echo "PUBLIC_IP=$PUBLIC_IP"
          echo "SSH_USER=$SSH_USER"
          echo "APP_URL=$APP_URL"

      - name: Validate resolved values
        run: |
          test -n "$PUBLIC_DNS"
          test -n "$SSH_USER"

      - name: Write SSH key
        run: |
          echo "${{ secrets.EC2_SSH_KEY }}" | base64 -d > /tmp/ec2_key.pem
          chmod 400 /tmp/ec2_key.pem

      - name: Wait for SSH on public DNS
        run: |
          for i in {1..24}; do
            if ssh -i /tmp/ec2_key.pem -o StrictHostKeyChecking=no -o ConnectTimeout=10 \
              "$SSH_USER@$PUBLIC_DNS" "echo SSH OK" > /dev/null 2>&1; then
              echo "SSH is ready."
              exit 0
            fi
            echo "Attempt $i/24 - SSH not ready yet, waiting 10 seconds..."
            sleep 10
          done
          echo "SSH never became available."
          exit 1

      - name: Ensure target directory exists
        run: |
          ssh -i /tmp/ec2_key.pem -o StrictHostKeyChecking=no \
            "$SSH_USER@$PUBLIC_DNS" "
              sudo mkdir -p /opt/btg-funds &&
              sudo mkdir -p /opt/btg-funds/logs &&
              sudo chown -R $SSH_USER:$SSH_USER /opt/btg-funds
            "

      - name: Copy JAR to EC2
        run: |
          scp -i /tmp/ec2_key.pem -o StrictHostKeyChecking=no \
            btg-funds/target/btg-funds.jar \
            "$SSH_USER@$PUBLIC_DNS:/opt/btg-funds/btg-funds.jar"

      - name: Create application.properties
        run: |
          ssh -i /tmp/ec2_key.pem -o StrictHostKeyChecking=no \
            "$SSH_USER@$PUBLIC_DNS" <<EOF
          cat > /opt/btg-funds/application.properties <<EOL
          server.port=${{ secrets.SERVER_PORT }}
          spring.application.name=btg-funds
          spring.mongodb.uri=${{ secrets.MONGODB_URI }}
          spring.datasource.url=${{ secrets.DB_URL }}
          spring.datasource.username=${{ secrets.DB_USERNAME }}
          spring.datasource.password=${{ secrets.DB_PASSWORD }}
          spring.datasource.driver-class-name=org.postgresql.Driver
          spring.jpa.hibernate.ddl-auto=none
          spring.jpa.show-sql=true
          spring.jpa.properties.hibernate.format_sql=true
          spring.jpa.properties.hibernate.default_schema=btg
          spring.sendgrid.api-key=${{ secrets.SENDGRID_API_KEY }}
          spring.sendgrid.from-email=${{ secrets.SENDGRID_FROM_EMAIL }}
          jwt.secret=${{ secrets.JWT_SECRET }}
          jwt.expiration=${{ secrets.JWT_EXPIRATION }}
          twilio.account-sid=${{ secrets.TWILIO_ACCOUNT_SID }}
          twilio.auth-token=${{ secrets.TWILIO_AUTH_TOKEN }}
          twilio.from-number=${{ secrets.TWILIO_FROM_NUMBER }}
          management.endpoints.web.exposure.include=health,info
          management.endpoint.health.show-details=always
          EOL
          EOF

      - name: Create systemd service
        run: |
          ssh -i /tmp/ec2_key.pem -o StrictHostKeyChecking=no \
            "$SSH_USER@$PUBLIC_DNS" <<EOF
          sudo tee /etc/systemd/system/btg-funds.service > /dev/null <<EOL
          [Unit]
          Description=BTG Funds API
          After=network.target

          [Service]
          User=$SSH_USER
          WorkingDirectory=/opt/btg-funds
          ExecStart=/usr/bin/java -jar /opt/btg-funds/btg-funds.jar --spring.config.location=file:/opt/btg-funds/application.properties
          SuccessExitStatus=143
          Restart=always
          RestartSec=5

          [Install]
          WantedBy=multi-user.target
          EOL
          EOF

      - name: Restart service
        run: |
          ssh -i /tmp/ec2_key.pem -o StrictHostKeyChecking=no \
            "$SSH_USER@$PUBLIC_DNS" "
              sudo systemctl daemon-reload &&
              sudo systemctl enable btg-funds &&
              sudo systemctl restart btg-funds
            "

      - name: Verify deployment
        run: |
          ssh -i /tmp/ec2_key.pem -o StrictHostKeyChecking=no \
            "$SSH_USER@$PUBLIC_DNS" "
              set -e

              echo 'Checking service startup status...'
              sudo systemctl status btg-funds --no-pager || true

              for i in {1..18}; do
                STATUS=\$(sudo systemctl is-active btg-funds || true)
                echo \"Current service status: \$STATUS\"

                if curl -fsS -X POST http://localhost:${{ secrets.SERVER_PORT }}/api/auth/login \
                  -H 'Content-Type: application/json' \
                  -d '{\"username\":\"${{ secrets.VERIFY_USERNAME }}\",\"password\":\"${{ secrets.VERIFY_PASSWORD }}\"}' \
                  > /dev/null; then
                  echo 'Application is up and login endpoint is responding.'
                  exit 0
                fi

                echo \"Attempt \$i/18 - app not ready yet, waiting 5 seconds...\"
                sleep 5

                if [ \"\$STATUS\" = \"failed\" ] || [ \"\$STATUS\" = \"inactive\" ]; then
                  echo 'Service entered a bad state.'
                  sudo systemctl status btg-funds --no-pager
                  sudo journalctl -u btg-funds -n 100 --no-pager
                  exit 1
                fi
              done

              echo 'Application did not respond in time.'
              sudo systemctl status btg-funds --no-pager
              sudo journalctl -u btg-funds -n 100 --no-pager
              exit 1
            "