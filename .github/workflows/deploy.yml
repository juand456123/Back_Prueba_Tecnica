name: BTG Funds CI/CD

on:
  push:
    branches:
      - main
    paths:
      - 'btg-funds/infra/**'
      - 'btg-funds/src/**'
      - 'btg-funds/pom.xml'
      - 'btg-funds/mvnw'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

jobs:
  infra:
    name: Resolve or Provision Infrastructure
    runs-on: ubuntu-latest
    environment: produccion

    defaults:
      run:
        shell: bash

    outputs:
      public_dns: ${{ steps.resolve_instance.outputs.public_dns }}
      public_ip: ${{ steps.resolve_instance.outputs.public_ip }}
      ssh_user: ${{ steps.resolve_instance.outputs.ssh_user }}
      app_url: ${{ steps.resolve_instance.outputs.app_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check if EC2 already exists
        id: check_instance
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}
        run: |
          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=btg-funds-api" "Name=instance-state-name,Values=pending,running,stopping,stopped" \
            --query "Reservations[].Instances[].InstanceId | [0]" \
            --output text)

          if [ "$INSTANCE_ID" = "None" ] || [ -z "$INSTANCE_ID" ]; then
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "No existing instance found."
          else
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "instance_id=$INSTANCE_ID" >> "$GITHUB_OUTPUT"
            echo "Existing instance found: $INSTANCE_ID"
          fi

      - name: Setup Terraform
        if: steps.check_instance.outputs.exists == 'false'
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        if: steps.check_instance.outputs.exists == 'false'
        working-directory: btg-funds/infra
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}
        run: terraform init -input=false

      - name: Terraform Validate
        if: steps.check_instance.outputs.exists == 'false'
        working-directory: btg-funds/infra
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}
        run: terraform validate

      - name: Terraform Plan
        if: steps.check_instance.outputs.exists == 'false'
        working-directory: btg-funds/infra
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}
        run: terraform plan -input=false -var-file="terraform.tfvars" -out=tfplan

      - name: Terraform Apply
        if: steps.check_instance.outputs.exists == 'false'
        working-directory: btg-funds/infra
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}
        run: terraform apply -input=false -auto-approve tfplan

      - name: Resolve instance info from AWS
        id: resolve_instance
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
        run: |
          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=btg-funds-api" "Name=instance-state-name,Values=pending,running,stopping,stopped" \
            --query "Reservations[].Instances[].InstanceId | [0]" \
            --output text)

          if [ "$INSTANCE_ID" = "None" ] || [ -z "$INSTANCE_ID" ]; then
            echo "No EC2 instance found after Terraform/apply."
            exit 1
          fi

          STATE=$(aws ec2 describe-instances \
            --instance-ids "$INSTANCE_ID" \
            --query "Reservations[0].Instances[0].State.Name" \
            --output text)

          if [ "$STATE" = "stopped" ] || [ "$STATE" = "stopping" ]; then
            echo "Starting existing instance $INSTANCE_ID..."
            aws ec2 start-instances --instance-ids "$INSTANCE_ID" >/dev/null
          fi

          echo "Waiting for instance to be running..."
          aws ec2 wait instance-running --instance-ids "$INSTANCE_ID"

          for i in {1..30}; do
            PUBLIC_DNS=$(aws ec2 describe-instances \
              --instance-ids "$INSTANCE_ID" \
              --query "Reservations[0].Instances[0].PublicDnsName" \
              --output text)

            PUBLIC_IP=$(aws ec2 describe-instances \
              --instance-ids "$INSTANCE_ID" \
              --query "Reservations[0].Instances[0].PublicIpAddress" \
              --output text)

            if [ "$PUBLIC_DNS" != "None" ] && [ -n "$PUBLIC_DNS" ]; then
              echo "public_dns=$PUBLIC_DNS" >> "$GITHUB_OUTPUT"
              echo "public_ip=$PUBLIC_IP" >> "$GITHUB_OUTPUT"
              echo "ssh_user=ec2-user" >> "$GITHUB_OUTPUT"
              echo "app_url=http://$PUBLIC_IP:$SERVER_PORT" >> "$GITHUB_OUTPUT"
              echo "Resolved DNS: $PUBLIC_DNS"
              exit 0
            fi

            echo "Attempt $i/30 - public DNS not ready yet, waiting 10 seconds..."
            sleep 10
          done

          echo "Public DNS never became available."
          exit 1

  deploy:
    name: Build and Deploy Application
    runs-on: ubuntu-latest
    environment: produccion
    needs: infra

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Give permission to mvnw
        run: chmod +x btg-funds/mvnw

      - name: Run tests
        run: cd btg-funds && ./mvnw clean test

      - name: Build project
        run: cd btg-funds && ./mvnw clean package -DskipTests

      - name: Rename artifact
        run: |
          JAR_FILE=$(ls btg-funds/target/*.jar | head -n 1)
          cp "$JAR_FILE" btg-funds/target/btg-funds.jar

      - name: Write SSH key
        run: |
          echo "${{ secrets.EC2_SSH_KEY }}" | base64 -d > /tmp/ec2_key.pem
          chmod 400 /tmp/ec2_key.pem

      - name: Show target host
        run: |
          echo "Deploying to DNS: ${{ needs.infra.outputs.public_dns }}"
          echo "User: ${{ needs.infra.outputs.ssh_user }}"
          echo "App URL: ${{ needs.infra.outputs.app_url }}"

      - name: Wait for SSH on public DNS
        run: |
          for i in {1..24}; do
            if ssh -i /tmp/ec2_key.pem -o StrictHostKeyChecking=no -o ConnectTimeout=10 \
              ${{ needs.infra.outputs.ssh_user }}@${{ needs.infra.outputs.public_dns }} "echo SSH OK" > /dev/null 2>&1; then
              echo "SSH is ready."
              exit 0
            fi
            echo "Attempt $i/24 - SSH not ready yet, waiting 10 seconds..."
            sleep 10
          done
          echo "SSH never became available."
          exit 1

      - name: Ensure target directory exists
        run: |
          ssh -i /tmp/ec2_key.pem -o StrictHostKeyChecking=no \
            ${{ needs.infra.outputs.ssh_user }}@${{ needs.infra.outputs.public_dns }} "
              sudo mkdir -p /opt/btg-funds &&
              sudo mkdir -p /opt/btg-funds/logs &&
              sudo chown -R ${{ needs.infra.outputs.ssh_user }}:${{ needs.infra.outputs.ssh_user }} /opt/btg-funds
            "

      - name: Copy JAR to EC2
        run: |
          scp -i /tmp/ec2_key.pem -o StrictHostKeyChecking=no \
            btg-funds/target/btg-funds.jar \
            ${{ needs.infra.outputs.ssh_user }}@${{ needs.infra.outputs.public_dns }}:/opt/btg-funds/btg-funds.jar

      - name: Create application.properties
        run: |
          ssh -i /tmp/ec2_key.pem -o StrictHostKeyChecking=no \
            ${{ needs.infra.outputs.ssh_user }}@${{ needs.infra.outputs.public_dns }} <<EOF
          cat > /opt/btg-funds/application.properties <<EOL
          server.port=${{ secrets.SERVER_PORT }}
          spring.application.name=btg-funds
          spring.mongodb.uri=${{ secrets.MONGODB_URI }}
          spring.datasource.url=${{ secrets.DB_URL }}
          spring.datasource.username=${{ secrets.DB_USERNAME }}
          spring.datasource.password=${{ secrets.DB_PASSWORD }}
          spring.datasource.driver-class-name=org.postgresql.Driver
          spring.jpa.hibernate.ddl-auto=none
          spring.jpa.show-sql=true
          spring.jpa.properties.hibernate.format_sql=true
          spring.jpa.properties.hibernate.default_schema=btg
          spring.sendgrid.api-key=${{ secrets.SENDGRID_API_KEY }}
          spring.sendgrid.from-email=${{ secrets.SENDGRID_FROM_EMAIL }}
          jwt.secret=${{ secrets.JWT_SECRET }}
          jwt.expiration=${{ secrets.JWT_EXPIRATION }}
          twilio.account-sid=${{ secrets.TWILIO_ACCOUNT_SID }}
          twilio.auth-token=${{ secrets.TWILIO_AUTH_TOKEN }}
          twilio.from-number=${{ secrets.TWILIO_FROM_NUMBER }}
          management.endpoints.web.exposure.include=health,info
          management.endpoint.health.show-details=always
          EOL
          EOF

      - name: Create systemd service
        run: |
          ssh -i /tmp/ec2_key.pem -o StrictHostKeyChecking=no \
            ${{ needs.infra.outputs.ssh_user }}@${{ needs.infra.outputs.public_dns }} <<EOF
          sudo tee /etc/systemd/system/btg-funds.service > /dev/null <<EOL
          [Unit]
          Description=BTG Funds API
          After=network.target

          [Service]
          User=${{ needs.infra.outputs.ssh_user }}
          WorkingDirectory=/opt/btg-funds
          ExecStart=/usr/bin/java -jar /opt/btg-funds/btg-funds.jar --spring.config.location=file:/opt/btg-funds/application.properties
          SuccessExitStatus=143
          Restart=always
          RestartSec=5

          [Install]
          WantedBy=multi-user.target
          EOL
          EOF

      - name: Restart service
        run: |
          ssh -i /tmp/ec2_key.pem -o StrictHostKeyChecking=no \
            ${{ needs.infra.outputs.ssh_user }}@${{ needs.infra.outputs.public_dns }} "
              sudo systemctl daemon-reload &&
              sudo systemctl enable btg-funds &&
              sudo systemctl restart btg-funds
            "

      - name: Verify deployment
        run: |
          ssh -i /tmp/ec2_key.pem -o StrictHostKeyChecking=no \
            ${{ needs.infra.outputs.ssh_user }}@${{ needs.infra.outputs.public_dns }} "
              set -e

              echo 'Checking service status...'
              sudo systemctl is-active btg-funds

              echo 'Waiting for application to respond on port ${{ secrets.SERVER_PORT }}...'

              for i in {1..18}; do
                if curl -fsS http://localhost:${{ secrets.SERVER_PORT }}/actuator/health > /dev/null; then
                  echo 'Application is up and health endpoint is responding.'
                  exit 0
                fi

                echo \"Attempt \$i/18 - app not ready yet, waiting 5 seconds...\"
                sleep 5

                if ! sudo systemctl is-active --quiet btg-funds; then
                  echo 'Service is no longer active.'
                  sudo systemctl status btg-funds --no-pager
                  sudo journalctl -u btg-funds -n 100 --no-pager
                  exit 1
                fi
              done

              echo 'Application did not respond in time.'
              sudo systemctl status btg-funds --no-pager
              sudo journalctl -u btg-funds -n 100 --no-pager
              exit 1
            "